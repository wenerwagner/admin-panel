services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin_panel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_panel_password}
      POSTGRES_DB: ${POSTGRES_DB:-admin_panel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-admin_panel}:${POSTGRES_PASSWORD:-admin_panel_password}@postgres:5432/${POSTGRES_DB:-admin_panel}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-admin_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-8}
      CSRF_SECRET: ${CSRF_SECRET:-local_csrf_secret_change_me_before_production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres_data:
